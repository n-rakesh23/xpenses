name: Build & Deploy to Kubernetes (kops)

on:
  push:
    branches: [main]

env:
  DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
  IMAGE_TAG: ${{ github.sha }}

jobs:
  # ─────────────────────────────────────────────
  # Job 1: build + push both images in parallel
  # ─────────────────────────────────────────────
  build:
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ env.IMAGE_TAG }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/xpense-backend:${{ env.IMAGE_TAG }}
            ${{ secrets.DOCKER_USERNAME }}/xpense-backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          # VITE_API_URL is intentionally omitted — client.js defaults to /api
          # which works with path-based ingress routing
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/xpense-frontend:${{ env.IMAGE_TAG }}
            ${{ secrets.DOCKER_USERNAME }}/xpense-frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─────────────────────────────────────────────
  # Job 2: apply k8s manifests + roll out images
  # ─────────────────────────────────────────────
  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment: production          # optional: adds a manual approval gate in GitHub

    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2

      - name: Install kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: "v1.29.0"

      - name: Set up kubeconfig
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBE_CONFIG }}" | base64 -d > $HOME/.kube/config
          chmod 600 $HOME/.kube/config

      - name: Verify cluster connection
        run: kubectl get nodes

      - name: Apply namespace + config (idempotent)
        run: |
          kubectl apply -f k8s/00-namespace.yaml
          kubectl apply -f k8s/02-configmap.yaml

      - name: Apply infrastructure (postgres, redis) — skip if already running
        run: |
          kubectl apply -f k8s/03-postgres.yaml
          kubectl apply -f k8s/04-redis.yaml

      - name: Wait for postgres
        run: kubectl wait --namespace xpense --for=condition=ready pod -l app=postgres --timeout=120s

      - name: Run DB migration (skipped if job already completed)
        run: |
          # Delete old completed job so we can re-run if schema changed
          kubectl delete job db-init -n xpense --ignore-not-found
          kubectl apply -f k8s/05-db-init-job.yaml
          kubectl wait --namespace xpense --for=condition=complete job/db-init --timeout=60s

      - name: Apply backend + frontend manifests
        run: |
          kubectl apply -f k8s/06-backend.yaml
          kubectl apply -f k8s/07-frontend.yaml
          kubectl apply -f k8s/08-ingress.yaml

      - name: Roll out new images
        env:
          REGISTRY: ${{ secrets.DOCKER_USERNAME }}
          TAG: ${{ env.IMAGE_TAG }}
        run: |
          kubectl set image deployment/backend \
            backend=$REGISTRY/xpense-backend:$TAG \
            -n xpense
          kubectl set image deployment/frontend \
            frontend=$REGISTRY/xpense-frontend:$TAG \
            -n xpense

      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/backend  -n xpense --timeout=120s
          kubectl rollout status deployment/frontend -n xpense --timeout=120s

      - name: Verify pods
        run: kubectl get pods -n xpense
