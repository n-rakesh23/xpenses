apiVersion: v1
kind: Secret
metadata:
  name: xpense-secrets
  namespace: xpense
type: Opaque
stringData:
  # Database — points to the in-cluster postgres Service
  DATABASE_URL: "postgresql://xpense:CHANGE_ME_POSTGRES_PASSWORD@postgres:5432/xpense"
  POSTGRES_PASSWORD: "CHANGE_ME_POSTGRES_PASSWORD"

  # Redis — points to the in-cluster redis Service
  REDIS_URL: "redis://redis:6379"

  # JWT
  JWT_SECRET: "CHANGE_ME_256_BIT_RANDOM_STRING"
  JWT_MAGIC_LINK_EXPIRY: "15m"
  JWT_SESSION_EXPIRY: "7d"

  # WhatsApp (Meta Cloud API)
  WHATSAPP_TOKEN: "CHANGE_ME"
  WHATSAPP_PHONE_ID: "CHANGE_ME"
  META_APP_SECRET: "CHANGE_ME"
  META_VERIFY_TOKEN: "CHANGE_ME"

  # Telegram
  TELEGRAM_BOT_TOKEN: "CHANGE_ME"
  TELEGRAM_SECRET_TOKEN: "CHANGE_ME"

  # Cloudinary
  CLOUDINARY_URL: "cloudinary://CHANGE_ME:CHANGE_ME@CHANGE_ME"

  # Razorpay
  RAZORPAY_KEY_ID: "CHANGE_ME"
  RAZORPAY_KEY_SECRET: "CHANGE_ME"
