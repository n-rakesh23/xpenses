apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: xpense-ingress
  namespace: xpense
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - 3-111-109-127.sslip.io
      secretName: xpense-tls
  rules:
    - host: 3-111-109-127.sslip.io
      http:
        paths:
          # Backend: all /api/* and /webhook/* traffic
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: backend
                port:
                  number: 3000
          - path: /webhook
            pathType: Prefix
            backend:
              service:
                name: backend
                port:
                  number: 3000
          # Health check path for load-balancer probes
          - path: /health
            pathType: Prefix
            backend:
              service:
                name: backend
                port:
                  number: 3000
          # Frontend: everything else
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 80
