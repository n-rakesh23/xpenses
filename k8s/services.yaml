apiVersion: v1
kind: Service
metadata:
  name: xpense-backend
  namespace: xpense
spec:
  selector:
    app: xpense-backend
  ports:
    - port: 80
      targetPort: 3000
  type: ClusterIP
---
apiVersion: v1
kind: Service
metadata:
  name: xpense-frontend
  namespace: xpense
spec:
  selector:
    app: xpense-frontend
  ports:
    - port: 80
      targetPort: 80
  type: ClusterIP
