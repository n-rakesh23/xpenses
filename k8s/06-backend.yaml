apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: xpense
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          # Replace YOUR_REGISTRY with your Docker Hub username or registry URL
          image: YOUR_REGISTRY/xpense-backend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
          envFrom:
            - secretRef:
                name: xpense-secrets
            - configMapRef:
                name: xpense-config
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 30
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: xpense
spec:
  selector:
    app: backend
  ports:
    - port: 3000
      targetPort: 3000
