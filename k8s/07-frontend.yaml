apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: xpense
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          # Replace YOUR_REGISTRY with your Docker Hub username or registry URL
          image: YOUR_REGISTRY/xpense-frontend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "128Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: xpense
spec:
  selector:
    app: frontend
  ports:
    - port: 80
      targetPort: 80
