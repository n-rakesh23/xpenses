# Fill in base64-encoded values: echo -n "your-value" | base64
apiVersion: v1
kind: Secret
metadata:
  name: xpense-secrets
  namespace: xpense
type: Opaque
data:
  DATABASE_URL: BASE64_ENCODED_DATABASE_URL
  REDIS_URL: BASE64_ENCODED_REDIS_URL
  JWT_SECRET: BASE64_ENCODED_JWT_SECRET
  WHATSAPP_TOKEN: BASE64_ENCODED_WHATSAPP_TOKEN
  WHATSAPP_PHONE_ID: BASE64_ENCODED_WHATSAPP_PHONE_ID
  META_APP_SECRET: BASE64_ENCODED_META_APP_SECRET
  META_VERIFY_TOKEN: BASE64_ENCODED_META_VERIFY_TOKEN
  TELEGRAM_BOT_TOKEN: BASE64_ENCODED_TELEGRAM_BOT_TOKEN
  TELEGRAM_SECRET_TOKEN: BASE64_ENCODED_TELEGRAM_SECRET_TOKEN
  CLOUDINARY_URL: BASE64_ENCODED_CLOUDINARY_URL
  RAZORPAY_KEY_ID: BASE64_ENCODED_RAZORPAY_KEY_ID
  RAZORPAY_KEY_SECRET: BASE64_ENCODED_RAZORPAY_KEY_SECRET
